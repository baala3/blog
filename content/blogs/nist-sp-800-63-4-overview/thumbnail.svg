<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080f1a"/>
      <stop offset="100%" style="stop-color:#0d1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <marker id="arrt" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="100" x2="500" y2="100"/>
    <line x1="0" y1="200" x2="500" y2="200"/>
    <line x1="0" y1="300" x2="500" y2="300"/>
    <line x1="0" y1="400" x2="500" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
  </g>

  <!-- Glow -->
  <ellipse cx="250" cy="185" rx="170" ry="120" fill="#0ea5e9" fill-opacity="0.07"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="500" height="4" fill="url(#accent)"/>

  <!-- Document icon -->
  <g transform="translate(250, 148)">
    <!-- Document body -->
    <rect x="-38" y="-52" width="76" height="90" rx="6" fill="#0d1e35" stroke="#0ea5e9" stroke-width="1.8"/>
    <!-- Doc fold corner -->
    <path d="M18,-52 L38,-32 L18,-32 Z" fill="#0a1525" stroke="#0ea5e9" stroke-width="1"/>
    <!-- Lines on doc -->
    <line x1="-22" y1="-22" x2="10" y2="-22" stroke="#0ea5e9" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="-22" y1="-10" x2="14" y2="-10" stroke="#0ea5e9" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="-22" y1="2" x2="8" y2="2" stroke="#0ea5e9" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="-22" y1="14" x2="12" y2="14" stroke="#0ea5e9" stroke-width="1.5" stroke-opacity="0.3"/>
    <!-- NIST badge overlay -->
    <rect x="-18" y="24" width="36" height="16" rx="3" fill="#0ea5e9" fill-opacity="0.2" stroke="#0ea5e9" stroke-width="1"/>
    <text x="0" y="36" text-anchor="middle" font-family="monospace" font-size="8" fill="#7dd3fc">NIST</text>
  </g>

  <!-- Main acronym -->
  <text x="250" y="252" text-anchor="middle"
        font-family="monospace" font-size="46" font-weight="700" fill="#f0f9ff" letter-spacing="4">800-63</text>

  <!-- Divider -->
  <rect x="80" y="265" width="340" height="2" fill="url(#accent)" rx="1"/>

  <!-- Subtitle -->
  <text x="250" y="294" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">Digital Identity Framework</text>

  <!-- Tag pills -->
  <g transform="translate(250, 332)">
    <rect x="-175" y="-14" width="48" height="24" rx="12" fill="#0ea5e9" fill-opacity="0.15" stroke="#0ea5e9" stroke-width="1"/>
    <text x="-151" y="3" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">IAL</text>

    <rect x="-116" y="-14" width="48" height="24" rx="12" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-width="1"/>
    <text x="-92" y="3" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5b4fc">AAL</text>

    <rect x="-57" y="-14" width="48" height="24" rx="12" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-width="1"/>
    <text x="-33" y="3" text-anchor="middle" font-family="monospace" font-size="11" fill="#67e8f9">FAL</text>

    <rect x="2" y="-14" width="68" height="24" rx="12" fill="#0ea5e9" fill-opacity="0.15" stroke="#0ea5e9" stroke-width="1"/>
    <text x="36" y="3" text-anchor="middle" font-family="monospace" font-size="11" fill="#7dd3fc">Risk-driven</text>

    <rect x="81" y="-14" width="94" height="24" rx="12" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="1"/>
    <text x="128" y="3" text-anchor="middle" font-family="monospace" font-size="11" fill="#fcd34d">Fraud controls</text>
  </g>

  <!-- Mini flow: RA → xAL → CSP -->
  <g transform="translate(0, 410)">
    <rect x="44" y="0" width="96" height="34" rx="6" fill="#0d1e35" stroke="#0ea5e9" stroke-width="1.2"/>
    <text x="92" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#7dd3fc">Risk</text>
    <text x="92" y="27" text-anchor="middle" font-family="monospace" font-size="10" fill="#7dd3fc">Assessment</text>

    <line x1="143" y1="17" x2="187" y2="17" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrt)"/>

    <rect x="190" y="0" width="96" height="34" rx="6" fill="#0d1e35" stroke="#6366f1" stroke-width="1.2"/>
    <text x="238" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#a5b4fc">Select</text>
    <text x="238" y="27" text-anchor="middle" font-family="monospace" font-size="10" fill="#a5b4fc">xAL</text>

    <line x1="289" y1="17" x2="333" y2="17" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrt)"/>

    <rect x="336" y="0" width="96" height="34" rx="6" fill="#0d1e35" stroke="#06b6d4" stroke-width="1.2"/>
    <text x="384" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#67e8f9">Deploy</text>
    <text x="384" y="27" text-anchor="middle" font-family="monospace" font-size="10" fill="#67e8f9">CSP</text>
  </g>
</svg>
