<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0900"/>
      <stop offset="100%" style="stop-color:#1a1100"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <marker id="arrt" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="100" x2="500" y2="100"/>
    <line x1="0" y1="200" x2="500" y2="200"/>
    <line x1="0" y1="300" x2="500" y2="300"/>
    <line x1="0" y1="400" x2="500" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
  </g>

  <!-- Glow -->
  <ellipse cx="250" cy="175" rx="160" ry="110" fill="#f59e0b" fill-opacity="0.07"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="500" height="4" fill="url(#accent)"/>

  <!-- Key icon (authentication) -->
  <g transform="translate(250, 148)">
    <!-- Key ring -->
    <circle cx="-22" cy="0" r="28" fill="#1a1100" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="-22" cy="0" r="14" fill="#0d0900" stroke="#f59e0b" stroke-width="1.5"/>
    <!-- Key shaft -->
    <rect x="5" y="-7" width="58" height="14" rx="7" fill="#1a1100" stroke="#f59e0b" stroke-width="1.8"/>
    <!-- Key teeth -->
    <rect x="36" y="7" width="8" height="12" rx="2" fill="#f59e0b" fill-opacity="0.6"/>
    <rect x="50" y="7" width="8" height="8" rx="2" fill="#f59e0b" fill-opacity="0.6"/>
    <!-- Glow on ring -->
    <circle cx="-22" cy="0" r="6" fill="#fbbf24" fill-opacity="0.4"/>
    <!-- Phishing-resistant badge -->
    <rect x="20" y="-38" width="46" height="20" rx="10" fill="#1a1100" stroke="#fbbf24" stroke-width="1"/>
    <text x="43" y="-24" text-anchor="middle" font-family="monospace" font-size="8" fill="#fcd34d">hw-bound</text>
  </g>

  <!-- Main label -->
  <text x="250" y="256" text-anchor="middle"
        font-family="monospace" font-size="44" font-weight="700" fill="#fffbeb" letter-spacing="5">63B</text>

  <!-- Divider -->
  <rect x="80" y="270" width="340" height="2" fill="url(#accent)" rx="1"/>

  <!-- Subtitle -->
  <text x="250" y="298" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#fcd34d">Authentication Assurance</text>

  <!-- Tag pills -->
  <g transform="translate(250, 338)">
    <rect x="-180" y="-14" width="48" height="24" rx="12" fill="#f59e0b" fill-opacity="0.14" stroke="#f59e0b" stroke-width="1"/>
    <text x="-156" y="3" text-anchor="middle" font-family="monospace" font-size="11" fill="#fcd34d">AAL1</text>

    <rect x="-122" y="-14" width="48" height="24" rx="12" fill="#f59e0b" fill-opacity="0.2" stroke="#fbbf24" stroke-width="1"/>
    <text x="-98" y="3" text-anchor="middle" font-family="monospace" font-size="11" fill="#fbbf24">AAL2</text>

    <rect x="-64" y="-14" width="48" height="24" rx="12" fill="#fbbf24" fill-opacity="0.2" stroke="#fbbf24" stroke-width="1.2"/>
    <text x="-40" y="3" text-anchor="middle" font-family="monospace" font-size="11" fill="#fef3c7">AAL3</text>

    <rect x="0" y="-14" width="72" height="24" rx="12" fill="#f59e0b" fill-opacity="0.14" stroke="#f59e0b" stroke-width="1"/>
    <text x="36" y="3" text-anchor="middle" font-family="monospace" font-size="11" fill="#fcd34d">Passkeys</text>

    <rect x="82" y="-14" width="98" height="24" rx="12" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-width="1"/>
    <text x="131" y="3" text-anchor="middle" font-family="monospace" font-size="11" fill="#fca5a5">Phish-resistant</text>
  </g>

  <!-- Mini flow: Claimant → Verifier → Authenticated -->
  <g transform="translate(0, 412)">
    <rect x="28" y="0" width="110" height="34" rx="6" fill="#1a1100" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="83" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#fcd34d">Claimant</text>
    <text x="83" y="27" text-anchor="middle" font-family="monospace" font-size="9" fill="#78350f">presents cred</text>

    <line x1="141" y1="17" x2="176" y2="17" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrt)"/>

    <rect x="179" y="0" width="110" height="34" rx="6" fill="#1a1100" stroke="#fbbf24" stroke-width="1.2"/>
    <text x="234" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#fbbf24">Verifier</text>
    <text x="234" y="27" text-anchor="middle" font-family="monospace" font-size="9" fill="#78350f">checks AAL</text>

    <line x1="292" y1="17" x2="327" y2="17" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrt)"/>

    <rect x="330" y="0" width="120" height="34" rx="6" fill="#0d1a00" stroke="#10b981" stroke-width="1.5"/>
    <text x="390" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#6ee7b7">Authenticated</text>
    <text x="390" y="27" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">session granted</text>
  </g>

  <!-- Bottom AAL timeout badges -->
  <g transform="translate(250, 470)">
    <rect x="-150" y="-10" width="90" height="20" rx="10" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
    <text x="-105" y="4" text-anchor="middle" font-family="monospace" font-size="9" fill="#78350f">AAL1: 30d</text>

    <rect x="-50" y="-10" width="90" height="20" rx="10" fill="#f59e0b" fill-opacity="0.14" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.6"/>
    <text x="5" y="4" text-anchor="middle" font-family="monospace" font-size="9" fill="#d97706">AAL2: 24h</text>

    <rect x="50" y="-10" width="90" height="20" rx="10" fill="#fbbf24" fill-opacity="0.14" stroke="#fbbf24" stroke-width="1.2"/>
    <text x="105" y="4" text-anchor="middle" font-family="monospace" font-size="9" fill="#fef3c7">AAL3: 12h</text>
  </g>
</svg>
