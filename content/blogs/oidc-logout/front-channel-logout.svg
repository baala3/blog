<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 245" width="760" height="245">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#374151"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#15803d"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#b91c1c"/>
    </marker>
  </defs>
  <style>
    text { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
    .mono { font-family: ui-monospace, Menlo, Consolas, monospace; }
  </style>

  <rect width="760" height="245" fill="white"/>

  <!-- Title -->
  <text x="380" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Front-Channel Logout Flow</text>

  <!-- OP server box -->
  <rect x="10" y="38" width="140" height="130" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="80" y="60" text-anchor="middle" font-size="12" font-weight="600" fill="#6d28d9">OP Server</text>
  <text x="80" y="76" text-anchor="middle" font-size="10" fill="#8b5cf6">auth.example.com</text>
  <text x="80" y="100" text-anchor="middle" font-size="10" fill="#374151">Receives logout.</text>
  <text x="80" y="115" text-anchor="middle" font-size="10" fill="#374151">Builds page with</text>
  <text x="80" y="130" text-anchor="middle" font-size="10" fill="#374151">one iframe per RP</text>
  <text x="80" y="145" text-anchor="middle" font-size="10" fill="#374151">that joined the session.</text>

  <!-- Arrow from OP server to logout page -->
  <line x1="150" y1="103" x2="195" y2="103" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="172" y="97" text-anchor="middle" font-size="9" fill="#374151">serves</text>

  <!-- OP logout notification page (browser-rendered) -->
  <rect x="195" y="38" width="295" height="200" rx="8" fill="#fafafa" stroke="#6b7280" stroke-width="1.5"/>
  <text x="342" y="58" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">OP Logout Page (browser-rendered)</text>
  <text x="342" y="73" text-anchor="middle" font-size="10" fill="#9ca3af">auth.example.com/logout-notify</text>

  <!-- iframe 1 -->
  <rect x="210" y="82" width="265" height="45" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="342" y="99" text-anchor="middle" class="mono" font-size="10" fill="#1e40af">&lt;iframe src="app-a.example.com/logout</text>
  <text x="342" y="114" text-anchor="middle" class="mono" font-size="10" fill="#1e40af">  ?iss=auth.example.com&amp;sid=xyz"&gt;</text>

  <!-- iframe 2 -->
  <rect x="210" y="135" width="265" height="45" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="342" y="152" text-anchor="middle" class="mono" font-size="10" fill="#1e40af">&lt;iframe src="app-b.example.com/logout</text>
  <text x="342" y="167" text-anchor="middle" class="mono" font-size="10" fill="#1e40af">  ?iss=auth.example.com&amp;sid=xyz"&gt;</text>

  <!-- iframe 3 (faded) -->
  <rect x="210" y="188" width="265" height="25" rx="5" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="342" y="204" text-anchor="middle" font-size="10" fill="#94a3b8">… one per RP in session …</text>

  <!-- Arrows: iframes → RP-A and RP-B servers -->
  <line x1="490" y1="104" x2="540" y2="104" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="515" y="98" text-anchor="middle" font-size="9" fill="#374151">GET</text>

  <line x1="490" y1="157" x2="540" y2="157" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="515" y="151" text-anchor="middle" font-size="9" fill="#374151">GET</text>

  <!-- RP-A server box -->
  <rect x="540" y="80" width="205" height="50" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="642" y="99" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">RP-A /logout endpoint</text>
  <text x="642" y="115" text-anchor="middle" font-size="10" fill="#64748b">app-a.example.com</text>

  <!-- RP-B server box -->
  <rect x="540" y="132" width="205" height="50" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="642" y="151" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">RP-B /logout endpoint</text>
  <text x="642" y="167" text-anchor="middle" font-size="10" fill="#64748b">app-b.example.com</text>

</svg>
