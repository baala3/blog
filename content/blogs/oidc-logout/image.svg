<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#818cf8"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f87171"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#1e1040"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines -->
  <g stroke="white" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="63" x2="1200" y2="63"/>
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="189" x2="1200" y2="189"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="441" x2="1200" y2="441"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="0" y1="567" x2="1200" y2="567"/>
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>

  <!-- Glow blobs -->
  <ellipse cx="200" cy="300" rx="250" ry="200" fill="#6366f1" fill-opacity="0.05"/>
  <ellipse cx="900" cy="200" rx="300" ry="180" fill="#8b5cf6" fill-opacity="0.05"/>
  <ellipse cx="1050" cy="500" rx="200" ry="150" fill="#34d399" fill-opacity="0.04"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGrad)"/>

  <!-- Header section -->
  <rect x="0" y="4" width="1200" height="110" fill="url(#headerGrad)"/>

  <!-- Title -->
  <text x="60" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white">OpenID Connect Sessions: Logout Is Harder Than Login</text>

  <!-- Subtitle tags -->
  <rect x="60" y="70" width="80" height="26" rx="12" fill="#6366f1" fill-opacity="0.3" stroke="#6366f1" stroke-width="1"/>
  <text x="100" y="87" font-family="monospace" font-size="12" fill="#a5b4fc" text-anchor="middle">Identity</text>

  <rect x="150" y="70" width="80" height="26" rx="12" fill="#8b5cf6" fill-opacity="0.3" stroke="#8b5cf6" stroke-width="1"/>
  <text x="190" y="87" font-family="monospace" font-size="12" fill="#c4b5fd" text-anchor="middle">Security</text>

  <rect x="240" y="70" width="70" height="26" rx="12" fill="#6366f1" fill-opacity="0.3" stroke="#6366f1" stroke-width="1"/>
  <text x="275" y="87" font-family="monospace" font-size="12" fill="#a5b4fc" text-anchor="middle">OAuth</text>

  <rect x="320" y="70" width="90" height="26" rx="12" fill="#8b5cf6" fill-opacity="0.3" stroke="#8b5cf6" stroke-width="1"/>
  <text x="365" y="87" font-family="monospace" font-size="12" fill="#c4b5fd" text-anchor="middle">Federation</text>

  <!-- Section: Three Sessions diagram (left side) -->
  <text x="60" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#94a3b8">THREE SESSIONS, ONE LOGOUT</text>

  <!-- Federated SSO Session outer box -->
  <rect x="60" y="162" width="320" height="200" rx="10" fill="#1e1b4b" fill-opacity="0.6" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="220" y="182" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#818cf8" text-anchor="middle">Federated SSO Session</text>

  <!-- OP Session middle box -->
  <rect x="78" y="192" width="284" height="152" rx="8" fill="#1e1040" fill-opacity="0.6" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="220" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle">OP Session</text>

  <!-- RP-A Local Session -->
  <rect x="94" y="220" width="110" height="110" rx="8" fill="#1e1b4b" fill-opacity="0.8" stroke="#818cf8" stroke-width="1.5"/>
  <text x="149" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#c7d2fe" text-anchor="middle">RP-A Local</text>
  <text x="149" y="256" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#c7d2fe" text-anchor="middle">Session</text>
  <!-- User icon in RP-A -->
  <circle cx="149" cy="285" r="12" fill="none" stroke="#818cf8" stroke-width="1.5"/>
  <path d="M134,310 Q149,295 164,310" fill="none" stroke="#818cf8" stroke-width="1.5"/>

  <!-- RP-B Local Session -->
  <rect x="218" y="220" width="110" height="110" rx="8" fill="#1e1b4b" fill-opacity="0.8" stroke="#818cf8" stroke-width="1.5"/>
  <text x="273" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#c7d2fe" text-anchor="middle">RP-B Local</text>
  <text x="273" y="256" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#c7d2fe" text-anchor="middle">Session</text>
  <!-- User icon in RP-B -->
  <circle cx="273" cy="285" r="12" fill="none" stroke="#818cf8" stroke-width="1.5"/>
  <path d="M258,310 Q273,295 288,310" fill="none" stroke="#818cf8" stroke-width="1.5"/>

  <!-- ... label -->
  <text x="348" y="280" font-family="monospace" font-size="16" fill="#6366f1">···</text>

  <!-- Four Specs comparison (center) -->
  <text x="430" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#94a3b8">FOUR SPECS — ONE PROBLEM</text>

  <!-- Spec rows -->
  <!-- Session Management -->
  <rect x="430" y="162" width="340" height="46" rx="8" fill="#1e1b4b" fill-opacity="0.5" stroke="#374151" stroke-width="1.5"/>
  <rect x="430" y="162" width="4" height="46" rx="2" fill="#f59e0b"/>
  <text x="446" y="180" font-family="monospace" font-size="11" fill="#fbbf24">Session Management</text>
  <text x="446" y="197" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">iframe postMessage polling</text>
  <rect x="680" y="170" width="80" height="22" rx="10" fill="#7f1d1d" fill-opacity="0.6" stroke="#ef4444" stroke-width="1"/>
  <text x="720" y="185" font-family="monospace" font-size="10" fill="#fca5a5" text-anchor="middle">Broken</text>

  <!-- Front-Channel -->
  <rect x="430" y="216" width="340" height="46" rx="8" fill="#1e1b4b" fill-opacity="0.5" stroke="#374151" stroke-width="1.5"/>
  <rect x="430" y="216" width="4" height="46" rx="2" fill="#f97316"/>
  <text x="446" y="234" font-family="monospace" font-size="11" fill="#fb923c">Front-Channel Logout</text>
  <text x="446" y="251" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">OP renders logout iframes</text>
  <rect x="663" y="224" width="96" height="22" rx="10" fill="#7c2d12" fill-opacity="0.6" stroke="#f97316" stroke-width="1"/>
  <text x="711" y="239" font-family="monospace" font-size="10" fill="#fdba74" text-anchor="middle">Unreliable</text>

  <!-- RP-Initiated -->
  <rect x="430" y="270" width="340" height="46" rx="8" fill="#1e1b4b" fill-opacity="0.5" stroke="#374151" stroke-width="1.5"/>
  <rect x="430" y="270" width="4" height="46" rx="2" fill="#34d399"/>
  <text x="446" y="288" font-family="monospace" font-size="11" fill="#6ee7b7">RP-Initiated Logout</text>
  <text x="446" y="305" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Browser redirect to OP</text>
  <rect x="683" y="278" width="76" height="22" rx="10" fill="#064e3b" fill-opacity="0.6" stroke="#34d399" stroke-width="1"/>
  <text x="721" y="293" font-family="monospace" font-size="10" fill="#6ee7b7" text-anchor="middle">Works</text>

  <!-- Back-Channel -->
  <rect x="430" y="324" width="340" height="46" rx="8" fill="#1e1b4b" fill-opacity="0.5" stroke="#374151" stroke-width="1.5"/>
  <rect x="430" y="324" width="4" height="46" rx="2" fill="#34d399"/>
  <text x="446" y="342" font-family="monospace" font-size="11" fill="#6ee7b7">Back-Channel Logout</text>
  <text x="446" y="359" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Server-to-server signed JWT</text>
  <rect x="683" y="332" width="76" height="22" rx="10" fill="#064e3b" fill-opacity="0.6" stroke="#34d399" stroke-width="1"/>
  <text x="721" y="347" font-family="monospace" font-size="10" fill="#6ee7b7" text-anchor="middle">Works</text>

  <!-- Back-Channel Logout Flow (right side) -->
  <text x="840" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#94a3b8">BACK-CHANNEL FLOW</text>

  <!-- Browser box -->
  <rect x="840" y="162" width="140" height="54" rx="8" fill="#1e293b" fill-opacity="0.8" stroke="#475569" stroke-width="1.5"/>
  <text x="910" y="184" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Browser</text>
  <text x="910" y="200" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">User clicks logout</text>

  <!-- RP Server box -->
  <rect x="840" y="252" width="140" height="54" rx="8" fill="#1e1b4b" fill-opacity="0.8" stroke="#6366f1" stroke-width="1.5"/>
  <text x="910" y="274" font-family="system-ui, sans-serif" font-size="12" fill="#a5b4fc" text-anchor="middle">RP Server</text>
  <text x="910" y="290" font-family="monospace" font-size="10" fill="#818cf8" text-anchor="middle">end_session →</text>

  <!-- OP Server box -->
  <rect x="1020" y="252" width="140" height="54" rx="8" fill="#1e1040" fill-opacity="0.8" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="1090" y="274" font-family="system-ui, sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle">OP Server</text>
  <text x="1090" y="290" font-family="monospace" font-size="10" fill="#a78bfa" text-anchor="middle">logout + notify</text>

  <!-- RP-B Server box -->
  <rect x="840" y="370" width="140" height="54" rx="8" fill="#1e1b4b" fill-opacity="0.8" stroke="#34d399" stroke-width="1.5"/>
  <text x="910" y="392" font-family="system-ui, sans-serif" font-size="12" fill="#6ee7b7" text-anchor="middle">RP-B Server</text>
  <text x="910" y="408" font-family="monospace" font-size="10" fill="#34d399" text-anchor="middle">invalidate session</text>

  <!-- Arrow: Browser → RP Server -->
  <line x1="910" y1="216" x2="910" y2="250" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="6,3"/>

  <!-- Arrow: RP → OP -->
  <line x1="982" y1="279" x2="1018" y2="279" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: OP → RP-B (back-channel) -->
  <path d="M1090,306 L1090,395 L982,395" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Labels on arrows -->
  <text x="998" y="272" font-family="monospace" font-size="9" fill="#6366f1">redirect</text>
  <text x="1095" y="360" font-family="monospace" font-size="9" fill="#34d399">POST logout_token</text>

  <!-- Logout token snippet box -->
  <rect x="840" y="440" width="320" height="100" rx="8" fill="#0d1117" fill-opacity="0.9" stroke="#374151" stroke-width="1.5"/>
  <text x="855" y="460" font-family="monospace" font-size="10" fill="#6b7280">// Logout Token (JWT)</text>
  <text x="855" y="476" font-family="monospace" font-size="10" fill="#818cf8">iss: "https://op.example.com"</text>
  <text x="855" y="491" font-family="monospace" font-size="10" fill="#818cf8">aud: "client_id"</text>
  <text x="855" y="506" font-family="monospace" font-size="10" fill="#34d399">sid: "session-abc123"</text>
  <text x="855" y="521" font-family="monospace" font-size="10" fill="#fbbf24">events: &#123;"backchannel-logout": &#123;&#125;&#125;</text>

  <!-- sid warning callout -->
  <rect x="430" y="392" width="340" height="50" rx="8" fill="#7f1d1d" fill-opacity="0.3" stroke="#ef4444" stroke-width="1.5"/>
  <text x="600" y="412" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fca5a5" text-anchor="middle">Common Bug: Missing sid at Login</text>
  <text x="600" y="430" font-family="monospace" font-size="10" fill="#f87171" text-anchor="middle">sid not in OIDC Core — store it at login or back-channel fails</text>

  <!-- Code snippet bottom left -->
  <rect x="60" y="392" width="340" height="96" rx="8" fill="#0d1117" fill-opacity="0.9" stroke="#374151" stroke-width="1.5"/>
  <text x="75" y="412" font-family="monospace" font-size="10" fill="#6b7280"># Store at login time</text>
  <text x="75" y="428" font-family="monospace" font-size="10" fill="#818cf8">session = Session.create!(</text>
  <text x="75" y="443" font-family="monospace" font-size="10" fill="#6ee7b7">  user_id: id_token.sub,</text>
  <text x="75" y="458" font-family="monospace" font-size="10" fill="#6ee7b7">  op_sid:  id_token.sid,</text>
  <text x="75" y="473" font-family="monospace" font-size="10" fill="#94a3b8">)</text>

  <!-- Bottom tag line -->
  <text x="60" y="575" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#475569">OIDC Logout · Four Specs · Back-Channel · Session Management · Front-Channel · RP-Initiated · Browser Privacy</text>

  <!-- Bottom accent line -->
  <rect x="0" y="610" width="1200" height="3" fill="url(#accentGrad)"/>
</svg>
