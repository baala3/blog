  <text x="218" y="210" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Gateway</text>
  <text x="218" y="224" text-anchor="middle" font-family="monospace" font-size="8" fill="#06b6d4">X-Tenant-ID</text>

  <!-- Arrow to control plane -->
  <line x1="268" y1="195" x2="305" y2="175" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr3)"/>
