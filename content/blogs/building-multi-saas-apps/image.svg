    <line x1="244" y1="14" x2="262" y2="14" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

    <rect x="262" y="0" width="78" height="28" rx="6" fill="#0d1e30" stroke="#ef4444" stroke-width="1.5"/>
    <text x="301" y="18" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444">deactivated</text>
  </g>

  <!-- ========== RIGHT: CODE SNIPPET + LABELS ========== -->

  <!-- Vertical divider -->
  <line x1="640" y1="105" x2="640" y2="615" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Code snippet panel -->
  <rect x="660" y="115" width="510" height="265" rx="10" fill="#060e1a" stroke="#1e2d40" stroke-width="1.5"/>

  <!-- Code panel header -->
  <rect x="660" y="115" width="510" height="28" rx="10" fill="#0c1826"/>
  <rect x="660" y="130" width="510" height="13" fill="#0c1826"/>
  <circle cx="681" cy="129" r="5" fill="#ef4444" fill-opacity="0.7"/>
  <circle cx="698" cy="129" r="5" fill="#f59e0b" fill-opacity="0.7"/>
  <circle cx="715" cy="129" r="5" fill="#10b981" fill-opacity="0.7"/>
  <text x="740" y="133" font-family="monospace" font-size="10" fill="#475569">tenant_context_middleware.rb</text>

  <!-- Code content -->
  <text x="676" y="163" font-family="monospace" font-size="11" fill="#475569">01</text>
  <text x="700" y="163" font-family="monospace" font-size="11" fill="#7c3aed">class</text>
  <text x="738" y="163" font-family="monospace" font-size="11" fill="#06b6d4">TenantContextMiddleware</text>

  <text x="676" y="181" font-family="monospace" font-size="11" fill="#475569">02</text>
  <text x="700" y="181" font-family="monospace" font-size="11" fill="#7c3aed">  def</text>
  <text x="728" y="181" font-family="monospace" font-size="11" fill="#10b981">call</text>
  <text x="756" y="181" font-family="monospace" font-size="11" fill="#f1f5f9">(env)</text>

  <text x="676" y="199" font-family="monospace" font-size="11" fill="#475569">03</text>
  <text x="700" y="199" font-family="monospace" font-size="11" fill="#94a3b8">    token = extract_jwt(env)</text>

  <text x="676" y="217" font-family="monospace" font-size="11" fill="#475569">04</text>
  <text x="700" y="217" font-family="monospace" font-size="11" fill="#94a3b8">    claims = JWT.decode(token)</text>

  <text x="676" y="235" font-family="monospace" font-size="11" fill="#475569">05</text>
  <text x="700" y="235" font-family="monospace" font-size="11" fill="#f1f5f9">    env[</text>
  <text x="736" y="235" font-family="monospace" font-size="11" fill="#fbbf24">'tenant.id'</text>
  <text x="813" y="235" font-family="monospace" font-size="11" fill="#f1f5f9">] = claims[</text>
  <text x="882" y="235" font-family="monospace" font-size="11" fill="#fbbf24">'tenant_id'</text>
  <text x="958" y="235" font-family="monospace" font-size="11" fill="#f1f5f9">]</text>

  <text x="676" y="253" font-family="monospace" font-size="11" fill="#475569">06</text>
  <text x="700" y="253" font-family="monospace" font-size="11" fill="#f1f5f9">    env[</text>
  <text x="736" y="253" font-family="monospace" font-size="11" fill="#fbbf24">'tenant.tier'</text>
  <text x="818" y="253" font-family="monospace" font-size="11" fill="#f1f5f9">] = claims[</text>
  <text x="887" y="253" font-family="monospace" font-size="11" fill="#fbbf24">'tier'</text>
  <text x="923" y="253" font-family="monospace" font-size="11" fill="#f1f5f9">]</text>

  <text x="676" y="271" font-family="monospace" font-size="11" fill="#475569">07</text>
  <text x="700" y="271" font-family="monospace" font-size="11" fill="#94a3b8">    @app.call(env)</text>

  <text x="676" y="289" font-family="monospace" font-size="11" fill="#475569">08</text>
  <text x="700" y="289" font-family="monospace" font-size="11" fill="#7c3aed">  end</text>

  <text x="676" y="307" font-family="monospace" font-size="11" fill="#475569">09</text>
  <text x="700" y="307" font-family="monospace" font-size="11" fill="#7c3aed">end</text>

  <!-- Comment overlay -->
  <text x="676" y="355" font-family="monospace" font-size="10" fill="#475569"># Never parse tokens in business logic</text>
  <text x="676" y="370" font-family="monospace" font-size="10" fill="#475569"># Centralize via interception patterns</text>

  <!-- ========== KEY CONCEPT CALLOUT BOXES ========== -->

  <!-- Callout 1: Noisy Neighbor -->
  <rect x="660" y="400" width="155" height="60" rx="8" fill="#1c0a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="737" y="420" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#ef4444">Noisy Neighbor</text>
  <text x="737" y="436" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">Rate-limit per tenant</text>
  <text x="737" y="450" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">emit tenant_id metrics</text>

  <!-- Callout 2: Tenant Context -->
  <rect x="825" y="400" width="155" height="60" rx="8" fill="#081e20" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="902" y="420" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#14b8a6">Tenant Context</text>
  <text x="902" y="436" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">JWT custom claims</text>
  <text x="902" y="450" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">tenant_id · tier · roles</text>

  <!-- Callout 3: Data Isolation -->
  <rect x="990" y="400" width="155" height="60" rx="8" fill="#081e15" stroke="#10b981" stroke-width="1.5"/>
  <text x="1067" y="420" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#10b981">Data Isolation</text>
  <text x="1067" y="436" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">RLS · schema-per-tenant</text>
  <text x="1067" y="450" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">DB-per-tenant (silo)</text>

  <!-- ========== BOTTOM: DEPLOYMENT MODELS ========== -->

  <line x1="40" y1="395" x2="620" y2="395" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="40" y="415" font-family="monospace" font-size="10" fill="#475569" letter-spacing="2">DEPLOYMENT MODELS</text>

  <!-- Full-Stack Pooled -->
  <rect x="40" y="425" width="120" height="50" rx="8" fill="#0a1e18" stroke="#10b981" stroke-width="1.5"/>
  <text x="100" y="444" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#10b981">Full Pooled</text>
  <text x="100" y="459" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">shared stack</text>
  <text x="100" y="469" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">cost optimized</text>

  <!-- Full-Stack Siloed -->
  <rect x="170" y="425" width="120" height="50" rx="8" fill="#0d1e30" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="230" y="444" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#06b6d4">Full Siloed</text>
  <text x="230" y="459" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">isolated stack</text>
  <text x="230" y="469" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">enterprise tier</text>

  <!-- Hybrid -->
  <rect x="300" y="425" width="100" height="50" rx="8" fill="#0d1e30" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="350" y="444" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#14b8a6">Hybrid</text>
  <text x="350" y="459" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">pooled + silo</text>
  <text x="350" y="469" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">most common</text>

  <!-- Pod-Based -->
  <rect x="410" y="425" width="100" height="50" rx="8" fill="#0d1e30" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="460" y="444" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#7c3aed">Pod-Based</text>
  <text x="460" y="459" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">grouped tenants</text>
  <text x="460" y="469" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">k8s clusters</text>

  <!-- ========== BOTTOM BAR ========== -->
  <rect x="0" y="590" width="1200" height="40" fill="#030810" fill-opacity="0.8"/>
  <text x="40" y="614" font-family="monospace" font-size="11" fill="#14b8a6">tod golding</text>
  <text x="128" y="614" font-family="monospace" font-size="11" fill="#475569">·  Building Multi-Tenant SaaS Architectures</text>
  <text x="1100" y="614" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">Architecture &amp; Patterns</text>
</svg>
