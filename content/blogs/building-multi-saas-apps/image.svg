  <rect x="305" y="135" width="155" height="80" rx="10" fill="#091c2e" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="382" y="157" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#06b6d4">CONTROL PLANE</text>
  <text x="382" y="172" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Onboarding · Identity</text>
  <text x="382" y="185" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Billing · Lifecycle</text>
  <text x="382" y="198" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Metrics · Governance</text>

  <!-- Application Plane box -->
  <rect x="305" y="228" width="155" height="80" rx="10" fill="#091c2e" stroke="#10b981" stroke-width="1.5"/>
  <text x="382" y="250" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#10b981">APP PLANE</text>
  <text x="382" y="265" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Business Logic</text>
  <text x="382" y="278" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Tenant Context</text>
  <text x="382" y="291" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Isolation Enforcement</text>

  <!-- Arrow from App Plane to data layer -->
  <line x1="460" y1="268" x2="494" y2="268" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Data layer: pooled + siloed -->
  <!-- Pooled DB -->
  <rect x="494" y="238" width="100" height="36" rx="8" fill="#0d1e30" stroke="#10b981" stroke-width="1.5"/>
  <text x="544" y="254" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">Pooled DB</text>
  <text x="544" y="267" text-anchor="middle" font-family="monospace" font-size="8" fill="#10b981">tenant_id col</text>

  <!-- Siloed DB -->
  <rect x="494" y="284" width="100" height="36" rx="8" fill="#0d1e30" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="544" y="300" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">Siloed DB</text>
  <text x="544" y="313" text-anchor="middle" font-family="monospace" font-size="8" fill="#14b8a6">enterprise tier</text>

  <!-- Lifecycle flow -->
  <text x="40" y="305" font-family="monospace" font-size="10" fill="#475569" letter-spacing="2">TENANT LIFECYCLE</text>

  <!-- Lifecycle states -->
  <g transform="translate(40, 325)">
    <rect x="0" y="0" width="78" height="28" rx="6" fill="#0d1e30" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="39" y="18" text-anchor="middle" font-family="monospace" font-size="9" fill="#14b8a6">provisioning</text>

    <line x1="78" y1="14" x2="96" y2="14" stroke="#14b8a6" stroke-width="1.5" marker-end="url(#arr)"/>

    <rect x="96" y="0" width="56" height="28" rx="6" fill="#0d1e30" stroke="#10b981" stroke-width="1.5"/>
    <text x="124" y="18" text-anchor="middle" font-family="monospace" font-size="9" fill="#10b981">active</text>

    <line x1="152" y1="14" x2="170" y2="14" stroke="#14b8a6" stroke-width="1.5" marker-end="url(#arr)"/>

