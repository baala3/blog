  <rect x="40" y="183" width="90" height="36" rx="8" fill="#0d1e30" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="85" y="198" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">Tenant B</text>
  <text x="85" y="211" text-anchor="middle" font-family="monospace" font-size="8" fill="#14b8a6">standard</text>

  <!-- Tenant C -->
  <rect x="40" y="231" width="90" height="36" rx="8" fill="#0d1e30" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="85" y="246" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">Tenant C</text>
  <text x="85" y="259" text-anchor="middle" font-family="monospace" font-size="8" fill="#14b8a6">standard</text>

