<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060d1a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#14b8a6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="50" x2="500" y2="50"/>
    <line x1="0" y1="100" x2="500" y2="100"/>
    <line x1="0" y1="150" x2="500" y2="150"/>
    <line x1="0" y1="200" x2="500" y2="200"/>
    <line x1="0" y1="250" x2="500" y2="250"/>
    <line x1="0" y1="300" x2="500" y2="300"/>
    <line x1="0" y1="350" x2="500" y2="350"/>
    <line x1="0" y1="400" x2="500" y2="400"/>
    <line x1="0" y1="450" x2="500" y2="450"/>
    <line x1="50" y1="0" x2="50" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="250" y1="0" x2="250" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="350" y1="0" x2="350" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
  </g>

  <!-- Glow blobs -->
  <ellipse cx="250" cy="160" rx="180" ry="100" fill="#14b8a6" fill-opacity="0.07"/>
  <ellipse cx="120" cy="380" rx="120" ry="80" fill="#10b981" fill-opacity="0.06"/>
  <ellipse cx="400" cy="350" rx="100" ry="70" fill="#06b6d4" fill-opacity="0.06"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="500" height="4" fill="url(#accent)"/>

  <!-- Icon: layered boxes representing planes -->
  <g transform="translate(250, 105)">
    <!-- Control plane box -->
    <rect x="-52" y="-38" width="104" height="32" rx="6" fill="#0d2035" stroke="#14b8a6" stroke-width="1.5" stroke-opacity="0.8"/>
    <text x="0" y="-17" text-anchor="middle" font-family="monospace" font-size="10" fill="#14b8a6" font-weight="600">CONTROL PLANE</text>
    <!-- Arrow down -->
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#14b8a6" stroke-width="1.5" marker-end="url(#arr)"/>
    <!-- App plane box -->
    <rect x="-52" y="6" width="104" height="32" rx="6" fill="#0d2035" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.8"/>
    <text x="0" y="27" text-anchor="middle" font-family="monospace" font-size="10" fill="#10b981" font-weight="600">APPLICATION PLANE</text>
  </g>

  <!-- Main acronym -->
  <text x="250" y="200" text-anchor="middle" font-family="monospace" font-size="44" font-weight="700" letter-spacing="4" fill="#f1f5f9">SaaS</text>

  <!-- Divider -->
  <rect x="60" y="215" width="380" height="1.5" rx="1" fill="url(#accent)" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="250" y="242" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#94a3b8" letter-spacing="1">Multi-Tenant Architecture</text>

  <!-- Tag pills row 1 -->
  <g transform="translate(250, 278)">
    <!-- Control Plane -->
    <rect x="-178" y="-14" width="102" height="24" rx="12" fill="#14b8a6" fill-opacity="0.15" stroke="#14b8a6" stroke-width="1" stroke-opacity="0.6"/>
    <text x="-127" y="3" text-anchor="middle" font-family="monospace" font-size="10" fill="#14b8a6">Control Plane</text>
    <!-- Isolation -->
    <rect x="-68" y="-14" width="76" height="24" rx="12" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.6"/>
    <text x="-30" y="3" text-anchor="middle" font-family="monospace" font-size="10" fill="#06b6d4">Isolation</text>
    <!-- Routing -->
    <rect x="16" y="-14" width="68" height="24" rx="12" fill="#14b8a6" fill-opacity="0.15" stroke="#14b8a6" stroke-width="1" stroke-opacity="0.6"/>
    <text x="50" y="3" text-anchor="middle" font-family="monospace" font-size="10" fill="#14b8a6">Routing</text>
    <!-- Data -->
    <rect x="93" y="-14" width="86" height="24" rx="12" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="1" stroke-opacity="0.6"/>
    <text x="136" y="3" text-anchor="middle" font-family="monospace" font-size="10" fill="#10b981">Partitioning</text>
  </g>

  <!-- Tag pills row 2 -->
  <g transform="translate(250, 312)">
    <!-- Siloed -->
    <rect x="-140" y="-14" width="60" height="24" rx="12" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.6"/>
    <text x="-110" y="3" text-anchor="middle" font-family="monospace" font-size="10" fill="#06b6d4">Siloed</text>
    <!-- Pooled -->
    <rect x="-68" y="-14" width="60" height="24" rx="12" fill="#14b8a6" fill-opacity="0.15" stroke="#14b8a6" stroke-width="1" stroke-opacity="0.6"/>
    <text x="-38" y="3" text-anchor="middle" font-family="monospace" font-size="10" fill="#14b8a6">Pooled</text>
    <!-- Hybrid -->
    <rect x="2" y="-14" width="62" height="24" rx="12" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="1" stroke-opacity="0.6"/>
    <text x="33" y="3" text-anchor="middle" font-family="monospace" font-size="10" fill="#10b981">Hybrid</text>
    <!-- Lifecycle -->
    <rect x="73" y="-14" width="70" height="24" rx="12" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.6"/>
    <text x="108" y="3" text-anchor="middle" font-family="monospace" font-size="10" fill="#06b6d4">Lifecycle</text>
  </g>

  <!-- Divider 2 -->
  <line x1="60" y1="345" x2="440" y2="345" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Mini flow diagram -->
  <g transform="translate(250, 400)">
    <!-- Tenant box -->
    <rect x="-185" y="-20" width="80" height="38" rx="8" fill="#0d2035" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="-145" y="-4" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Tenant</text>
    <text x="-145" y="10" text-anchor="middle" font-family="monospace" font-size="9" fill="#14b8a6">Request</text>

    <!-- Arrow 1 -->
    <line x1="-105" y1="0" x2="-78" y2="0" stroke="#14b8a6" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>

    <!-- Router box -->
    <rect x="-78" y="-20" width="76" height="38" rx="8" fill="#0d2035" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="-40" y="-4" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Router</text>
    <text x="-40" y="10" text-anchor="middle" font-family="monospace" font-size="9" fill="#06b6d4">Context</text>

    <!-- Arrow 2 -->
    <line x1="-2" y1="0" x2="25" y2="0" stroke="#14b8a6" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>

    <!-- App/CP box -->
    <rect x="25" y="-20" width="86" height="38" rx="8" fill="#0d2035" stroke="#10b981" stroke-width="1.5"/>
    <text x="68" y="-4" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">Service</text>
    <text x="68" y="10" text-anchor="middle" font-family="monospace" font-size="8" fill="#10b981">tenant_id</text>

    <!-- Arrow 3 -->
    <line x1="111" y1="0" x2="138" y2="0" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- DB box -->
    <rect x="138" y="-20" width="50" height="38" rx="8" fill="#0d2035" stroke="#10b981" stroke-width="1.5"/>
    <text x="163" y="-4" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Data</text>
    <text x="163" y="10" text-anchor="middle" font-family="monospace" font-size="8" fill="#10b981">isolated</text>
  </g>

  <!-- Bottom label -->
  <text x="250" y="468" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569" letter-spacing="2">ARCHITECTURE &amp; PATTERNS</text>
</svg>
