<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080412"/>
      <stop offset="100%" style="stop-color:#110820"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <marker id="arrt" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="100" x2="500" y2="100"/>
    <line x1="0" y1="200" x2="500" y2="200"/>
    <line x1="0" y1="300" x2="500" y2="300"/>
    <line x1="0" y1="400" x2="500" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
  </g>

  <!-- Glow -->
  <ellipse cx="250" cy="175" rx="165" ry="115" fill="#8b5cf6" fill-opacity="0.08"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="500" height="4" fill="url(#accent)"/>

  <!-- Trust boundary crossing icon: two nodes connected across a dashed line -->
  <g transform="translate(250, 150)">
    <!-- Left node (IdP) -->
    <circle cx="-65" cy="0" r="28" fill="#110820" stroke="#8b5cf6" stroke-width="2"/>
    <!-- Shield inside left node -->
    <path d="M-65,-14 L-51,-8 L-51,2 Q-51,12 -65,18 Q-79,12 -79,2 L-79,-8 Z" fill="#8b5cf6" fill-opacity="0.25" stroke="#8b5cf6" stroke-width="1.2"/>
    <path d="M-71,2 L-67,6 L-58,-4" stroke="#c4b5fd" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Trust boundary dashed line (vertical) -->
    <line x1="0" y1="-36" x2="0" y2="36" stroke="#3b0764" stroke-width="1.5" stroke-dasharray="5,4"/>
    <text x="0" y="-40" text-anchor="middle" font-family="monospace" font-size="8" fill="#3b0764">trust boundary</text>

    <!-- Arrow crossing boundary -->
    <line x1="-35" y1="0" x2="32" y2="0" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrt)"/>
    <!-- JWT token shape on arrow -->
    <rect x="-14" y="-9" width="28" height="18" rx="4" fill="#080412" stroke="#8b5cf6" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" font-family="monospace" font-size="7" fill="#c4b5fd">JWT</text>

    <!-- Right node (RP) -->
    <circle cx="65" cy="0" r="28" fill="#110820" stroke="#a78bfa" stroke-width="2"/>
    <rect x="54" y="-12" width="22" height="26" rx="3" fill="#a78bfa" fill-opacity="0.2" stroke="#a78bfa" stroke-width="1.2"/>
    <line x1="58" y1="-5" x2="72" y2="-5" stroke="#c4b5fd" stroke-width="1"/>
    <line x1="58" y1="1" x2="72" y2="1" stroke="#c4b5fd" stroke-width="1"/>
    <line x1="58" y1="7" x2="68" y2="7" stroke="#c4b5fd" stroke-width="1"/>

    <!-- IdP / RP labels -->
    <text x="-65" y="42" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b5cf6">IdP</text>
    <text x="65" y="42" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa">RP</text>
  </g>

  <!-- Main label -->
  <text x="250" y="258" text-anchor="middle"
        font-family="monospace" font-size="44" font-weight="700" fill="#faf5ff" letter-spacing="5">63C</text>

  <!-- Divider -->
  <rect x="80" y="272" width="340" height="2" fill="url(#accent)" rx="1"/>

  <!-- Subtitle -->
  <text x="250" y="300" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#c4b5fd">Federation &amp; Assertions</text>

  <!-- Tag pills -->
  <g transform="translate(250, 340)">
    <rect x="-185" y="-14" width="48" height="24" rx="12" fill="#8b5cf6" fill-opacity="0.14" stroke="#8b5cf6" stroke-width="1"/>
    <text x="-161" y="3" text-anchor="middle" font-family="monospace" font-size="11" fill="#c4b5fd">FAL1</text>

    <rect x="-127" y="-14" width="48" height="24" rx="12" fill="#8b5cf6" fill-opacity="0.2" stroke="#a78bfa" stroke-width="1"/>
    <text x="-103" y="3" text-anchor="middle" font-family="monospace" font-size="11" fill="#a78bfa">FAL2</text>

    <rect x="-69" y="-14" width="48" height="24" rx="12" fill="#a78bfa" fill-opacity="0.2" stroke="#a78bfa" stroke-width="1.2"/>
    <text x="-45" y="3" text-anchor="middle" font-family="monospace" font-size="11" fill="#ede9fe">FAL3</text>

    <rect x="0" y="-14" width="100" height="24" rx="12" fill="#8b5cf6" fill-opacity="0.14" stroke="#8b5cf6" stroke-width="1"/>
    <text x="50" y="3" text-anchor="middle" font-family="monospace" font-size="11" fill="#c4b5fd">Holder-of-key</text>

    <rect x="110" y="-14" width="76" height="24" rx="12" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-width="1"/>
    <text x="148" y="3" text-anchor="middle" font-family="monospace" font-size="11" fill="#ede9fe">Wallet VC</text>
  </g>

  <!-- Mini flow: IdP → Assertion → RP -->
  <g transform="translate(0, 412)">
    <rect x="28" y="0" width="100" height="34" rx="6" fill="#110820" stroke="#8b5cf6" stroke-width="1.2"/>
    <text x="78" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#c4b5fd">IdP</text>
    <text x="78" y="27" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b0764">authenticates</text>

    <line x1="131" y1="17" x2="180" y2="17" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrt)"/>
    <text x="156" y="11" text-anchor="middle" font-family="monospace" font-size="8" fill="#4b5563">assertion</text>

    <rect x="183" y="0" width="114" height="34" rx="6" fill="#110820" stroke="#a78bfa" stroke-width="1.2"/>
    <text x="240" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa">Trust Boundary</text>
    <text x="240" y="27" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b0764">signed JWT / SAML</text>

    <line x1="300" y1="17" x2="349" y2="17" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrt)"/>
    <text x="325" y="11" text-anchor="middle" font-family="monospace" font-size="8" fill="#4b5563">validate</text>

    <rect x="352" y="0" width="100" height="34" rx="6" fill="#110820" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="402" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#ede9fe">RP</text>
    <text x="402" y="27" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b0764">grants session</text>
  </g>

  <!-- FAL binding badges -->
  <g transform="translate(250, 470)">
    <rect x="-150" y="-10" width="86" height="20" rx="10" fill="#8b5cf6" fill-opacity="0.08" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.4"/>
    <text x="-107" y="4" text-anchor="middle" font-family="monospace" font-size="9" fill="#4b5563">FAL1: bearer</text>

    <rect x="-54" y="-10" width="86" height="20" rx="10" fill="#8b5cf6" fill-opacity="0.14" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.6"/>
    <text x="-11" y="4" text-anchor="middle" font-family="monospace" font-size="9" fill="#a78bfa">FAL2: RP-bound</text>

    <rect x="42" y="-10" width="100" height="20" rx="10" fill="#a78bfa" fill-opacity="0.14" stroke="#a78bfa" stroke-width="1.2"/>
    <text x="92" y="4" text-anchor="middle" font-family="monospace" font-size="9" fill="#ede9fe">FAL3: holder-of-key</text>
  </g>
</svg>
