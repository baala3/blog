<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3fb950"/>
    </marker>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22d3ee"/>
    </marker>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a78bfa"/>
    </marker>
    <marker id="a5" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="white" stroke-width="0.5" stroke-opacity="0.03"/>
    </pattern>
    <linearGradient id="topbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d1117"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow blobs -->
  <ellipse cx="160" cy="210" rx="310" ry="210" fill="#6366f1" fill-opacity="0.06"/>
  <ellipse cx="1060" cy="440" rx="260" ry="190" fill="#8b5cf6" fill-opacity="0.06"/>
  <ellipse cx="600" cy="570" rx="180" ry="80" fill="#22d3ee" fill-opacity="0.03"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#topbar)"/>

  <!-- Badge -->
  <rect x="60" y="28" width="90" height="24" rx="12" fill="#6366f1" fill-opacity="0.18" stroke="#6366f1" stroke-width="1"/>
  <text x="105" y="44" font-family="monospace" font-size="11" fill="#818cf8" text-anchor="middle">OAuth 2.0</text>

  <!-- Title -->
  <text x="60" y="93" font-family="system-ui,-apple-system,sans-serif" font-size="34" font-weight="700" fill="#f0f6fc">Dynamic Client Registration</text>
  <text x="60" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#8b949e">RFC 7591 + RFC 7592 — clients register and manage themselves at runtime</text>

  <!-- Tag pills -->
  <rect x="60" y="138" width="74" height="22" rx="11" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-width="1" stroke-opacity="0.6"/>
  <text x="97" y="153" font-family="monospace" font-size="11" fill="#818cf8" text-anchor="middle">RFC 7591</text>
  <rect x="144" y="138" width="74" height="22" rx="11" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.6"/>
  <text x="181" y="153" font-family="monospace" font-size="11" fill="#a78bfa" text-anchor="middle">RFC 7592</text>
  <rect x="228" y="138" width="78" height="22" rx="11" fill="#22d3ee" fill-opacity="0.1" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4"/>
  <text x="267" y="153" font-family="monospace" font-size="11" fill="#67e8f9" text-anchor="middle">Protocols</text>
  <rect x="316" y="138" width="106" height="22" rx="11" fill="#3fb950" fill-opacity="0.1" stroke="#3fb950" stroke-width="1" stroke-opacity="0.4"/>
  <text x="369" y="153" font-family="monospace" font-size="11" fill="#56d364" text-anchor="middle">Authentication</text>

  <!-- Section divider -->
  <line x1="60" y1="176" x2="1140" y2="176" stroke="#21262d" stroke-width="1"/>

  <!-- ===== LEFT PANEL: RFC 7591 ===== -->
  <text x="74" y="202" font-family="monospace" font-size="12" fill="#818cf8" font-weight="600">RFC 7591 — Registration</text>

  <!-- Client box -->
  <rect x="62" y="215" width="130" height="52" rx="8" fill="#161b22" stroke="#6366f1" stroke-width="1.5"/>
  <text x="127" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#f0f6fc" text-anchor="middle" font-weight="600">Client</text>
  <text x="127" y="255" font-family="monospace" font-size="9" fill="#484f58" text-anchor="middle">OAuth Application</text>

  <!-- POST /register arrow -->
  <line x1="192" y1="241" x2="348" y2="241" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#a1)"/>
  <text x="270" y="233" font-family="monospace" font-size="10" fill="#818cf8" text-anchor="middle">POST /register</text>
  <text x="270" y="255" font-family="monospace" font-size="9" fill="#484f58" text-anchor="middle">Bearer: initial_access_token</text>

  <!-- Auth Server box -->
  <rect x="348" y="215" width="160" height="52" rx="8" fill="#161b22" stroke="#6366f1" stroke-width="1.5"/>
  <text x="428" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#f0f6fc" text-anchor="middle" font-weight="600">Auth Server</text>
  <text x="428" y="255" font-family="monospace" font-size="9" fill="#484f58" text-anchor="middle">validates + stores</text>

  <!-- Arrow down: 201 -->
  <line x1="428" y1="267" x2="428" y2="302" stroke="#3fb950" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- Response box -->
  <rect x="296" y="302" width="266" height="152" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="296" y="302" width="266" height="26" rx="8" fill="#3fb950" fill-opacity="0.11"/>
  <rect x="296" y="316" width="266" height="12" fill="#3fb950" fill-opacity="0.11"/>
  <text x="314" y="320" font-family="monospace" font-size="11" fill="#56d364" font-weight="600">201 Created</text>
  <text x="314" y="344" font-family="monospace" font-size="10" fill="#8b949e">client_id:                "AhkNk..."</text>
  <text x="314" y="360" font-family="monospace" font-size="10" fill="#8b949e">client_secret:            "N7bq..."</text>
  <text x="314" y="376" font-family="monospace" font-size="10" fill="#8b949e">client_secret_expires_at: 0</text>
  <text x="314" y="392" font-family="monospace" font-size="10" fill="#818cf8">registration_access_token: "wjTs..."</text>
  <text x="314" y="408" font-family="monospace" font-size="10" fill="#818cf8">registration_client_uri:   "..."</text>
  <text x="314" y="430" font-family="monospace" font-size="9" fill="#f59e0b" font-style="italic">token shown once — save it or re-register</text>

  <!-- Note box -->
  <rect x="62" y="468" width="502" height="46" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="82" y="485" font-family="monospace" font-size="10" fill="#8b949e">initial_access_token guards POST /register</text>
  <text x="82" y="500" font-family="monospace" font-size="9" fill="#484f58">Require it in all production deployments — an open endpoint invites abuse</text>

  <!-- ===== VERTICAL DIVIDER ===== -->
  <line x1="597" y1="176" x2="597" y2="578" stroke="#21262d" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- ===== RIGHT PANEL: RFC 7592 ===== -->
  <text x="621" y="202" font-family="monospace" font-size="12" fill="#a78bfa" font-weight="600">RFC 7592 — Management</text>

  <!-- Client box (tall, spans 3 ops) -->
  <rect x="621" y="215" width="112" height="188" rx="8" fill="#161b22" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="677" y="306" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#f0f6fc" text-anchor="middle" font-weight="600">Client</text>
  <text x="677" y="322" font-family="monospace" font-size="9" fill="#484f58" text-anchor="middle">registered</text>

  <!-- AS box (tall, spans 3 ops) -->
  <rect x="1012" y="215" width="126" height="188" rx="8" fill="#161b22" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="1075" y="304" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#f0f6fc" text-anchor="middle" font-weight="600">Auth</text>
  <text x="1075" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#f0f6fc" text-anchor="middle" font-weight="600">Server</text>

  <!-- GET arrow -->
  <line x1="733" y1="257" x2="1012" y2="257" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#a3)"/>
  <text x="872" y="249" font-family="monospace" font-size="10" fill="#67e8f9" text-anchor="middle">GET /register/:client_id</text>
  <text x="872" y="268" font-family="monospace" font-size="9" fill="#56d364" text-anchor="middle">200 current metadata</text>

  <!-- PUT arrow -->
  <line x1="733" y1="309" x2="1012" y2="309" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#a4)"/>
  <text x="872" y="301" font-family="monospace" font-size="10" fill="#a78bfa" text-anchor="middle">PUT /register/:client_id</text>
  <text x="872" y="320" font-family="monospace" font-size="9" fill="#56d364" text-anchor="middle">200 updated  (full replace — send all fields)</text>

  <!-- DELETE arrow -->
  <line x1="733" y1="363" x2="1012" y2="363" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#a5)"/>
  <text x="872" y="355" font-family="monospace" font-size="10" fill="#f87171" text-anchor="middle">DELETE /register/:client_id</text>
  <text x="872" y="374" font-family="monospace" font-size="9" fill="#ef4444" text-anchor="middle">204 No Content</text>

  <!-- Bearer token note -->
  <rect x="733" y="420" width="268" height="24" rx="6" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.4"/>
  <text x="867" y="436" font-family="monospace" font-size="10" fill="#a78bfa" text-anchor="middle">Bearer: registration_access_token</text>

  <!-- Notes box -->
  <rect x="621" y="458" width="516" height="56" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="641" y="475" font-family="monospace" font-size="10" fill="#8b949e">After DELETE — registration_client_uri returns</text>
  <text x="873" y="475" font-family="monospace" font-size="10" fill="#ef4444">401</text>
  <text x="895" y="475" font-family="monospace" font-size="10" fill="#484f58">(not 404): endpoint exists, client does not</text>
  <text x="641" y="490" font-family="monospace" font-size="9" fill="#484f58">RFC 7592 is optional — implementing RFC 7591 does not require supporting management</text>
  <text x="641" y="503" font-family="monospace" font-size="9" fill="#484f58">registration_access_token rotation may occur on GET or PUT — always use the latest token</text>

  <!-- Footer -->
  <line x1="60" y1="572" x2="1140" y2="572" stroke="#21262d" stroke-width="1"/>
  <text x="60" y="592" font-family="monospace" font-size="10" fill="#30363d">datatracker.ietf.org/doc/html/rfc7591  ·  datatracker.ietf.org/doc/html/rfc7592</text>
</svg>
